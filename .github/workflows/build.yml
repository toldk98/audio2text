name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: audio2text
          python-version: "3.10"
          miniforge-version: latest

      - name: Install dependencies
        run: |
          pip install torch==2.3.0 torchaudio==2.3.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install conda-pack

      - name: Set version
        run: |
          echo "VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}" >> $GITHUB_ENV

      - name: Pack and bundle (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp *.py dist/
          cp -r gui dist/
          cp scripts/*.sh scripts/*.bat scripts/*.ps1 dist/ 2>/dev/null || true
          conda-pack -n audio2text -o dist/audio2text-env.tar.gz
          cd dist
          chmod +x *.sh
          tar -czf "../audio2text-$VERSION-linux-x86_64.tar.gz" .

      - name: Pack and bundle (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p dist
          cp *.py dist/
          cp -r gui dist/
          cp scripts/*.bat scripts/*.ps1 dist/ 2>/dev/null || true
          conda-pack -n audio2text -o dist/audio2text-env.tar.gz
          cd dist
          7z a "../audio2text-$VERSION-windows-x86_64.zip" *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: audio2text-${{ env.VERSION }}-*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
